name: Generate Snake

on:
workflow_dispatch:
schedule:
- cron: "0 0 * * *"

permissions:
contents: write

jobs:
generate:
runs-on: ubuntu-latest

```
steps:
  - name: Generate snake
    uses: Platane/snk@v3
    with:
      github_user_name: Aarushi-1408
      outputs: |
        dist/github-contribution-grid-snake.svg

  - name: Deploy to output branch
    uses: JamesIves/github-pages-deploy-action@v4
    with:
      branch: output
      folder: dist
      token: ${{ secrets.GITHUB_TOKEN }}
```
